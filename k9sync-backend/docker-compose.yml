# K9 Sync — dev local (PDF §6)
# version: supprimé (obsolète avec Docker Compose v2)
services:
  api:
    build: .
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - PORT=3000
      - API_PREFIX=v1
      - DATABASE_URL=postgresql://k9sync:password@postgres:5432/k9sync_dev
      - REDIS_URL=redis://redis:6379
      - MQTT_BROKER_URL=mqtt://mosquitto:1883
      - JWT_ACCESS_SECRET=dev_secret_min_32_characters_long
      - JWT_REFRESH_EXPIRES_DAYS=7
    depends_on:
      - postgres
    volumes:
      - ./src:/app/src
    command: npm run dev

  postgres:
    image: postgres:15-alpine
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: k9sync
      POSTGRES_PASSWORD: password
      POSTGRES_DB: k9sync_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - '1883:1883'
      - '9001:9001'
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

  adminer:
    image: adminer
    ports:
      - '8080:8080'

volumes:
  postgres_data:
